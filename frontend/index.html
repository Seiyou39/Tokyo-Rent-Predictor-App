<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>租房预测</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>东京租金预测</h1>

<form id="form">
    面积: <input id="area"><br>
    距离: <input id="walk"><br>
    房龄: <input id="age"><br>
    楼层: <input id="floor"><br>
    房间数: <input id="rooms"><br>

    区:
    <select id="ward">
        <option value="Shibuya">Shibuya</option>
        <option value="Minato">Minato</option>
    </select>

    房型:
    <select id="layout_type">
        <option value="K">K</option>
        <option value="LDK">LDK</option>
    </select>

    <button type="submit">预测</button>
</form>

<h2 id="result"></h2>

<script src="/static/script.js"></script>

</body>
</html>
